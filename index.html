<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Test Vocacional — UNO</title>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(to right, #f0f4f8, #d9e2ec);
  color: #333;
}

h1, h2 {
  text-align: center;
  color: #0d3b66;
  margin-bottom: 12px;
  font-size: 1.6rem;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 12px auto;
  width: 90%;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.pregunta {
  margin: 10px 0;
  padding: 14px;
  background: #e9f1f7;
  border-radius: 12px;
  font-size: 1.05rem;
}

.pregunta input {
  transform: scale(1.2);
  margin-right: 10px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 1rem;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  background: #0d3b66;
  color: white;
  border-radius: 16px;
  font-size: 1.1rem;
  cursor: pointer;
}

button:hover {
  background: #094172;
}

.logo {
  max-width: 120px;
}

/* Resultado bonito */
#resultado {
  text-align: center;
}

#carrera {
  margin-top: 10px;
  margin-bottom: 10px;
}

#detalle {
  font-size: 1rem;
  color: #444;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="card">
  <div style="text-align:center;">
    <img src="logo.png" class="logo">
  </div>
  <h1>Test Vocacional</h1>
  <p style="text-align:center;">Marca las opciones que se identifiquen contigo</p>
</div>

<div id="formulario" class="card">
  <h2>Datos del Estudiante</h2>
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="number" id="edad" placeholder="Edad">
  <input type="text" id="colegio" placeholder="Colegio">
  <input type="tel" id="celular" placeholder="Celular">
  <input type="text" id="carrera_deseada" placeholder="Carrera deseada">
  <button onclick="iniciarTest()">Iniciar Test</button>
</div>

<div id="test" class="card" style="display:none">
  <h2>Responde el Test</h2>
  <div id="preguntas"></div>
  <button onclick="procesar()">Finalizar</button>
</div>

<div id="cargando" class="card" style="display:none">
  <h2>⏳ Procesando...</h2>
</div>

<div id="resultado" class="card" style="display:none">
  <h2>Resultado</h2>
  <h3 id="carrera"></h3>
  <p id="detalle"></p>
  <button onclick="volver()">Volver</button>
</div>

<script>
// 16 preguntas
const preguntas = [
"¿Te interesa entender cómo funciona el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te ves cuidando pacientes en un hospital?",
"¿Te gustaría trabajar en rehabilitación física?",
"¿Te interesa el sistema legal?",
"¿Eres bueno con números?",
"¿Te interesa química y biología?",
"¿Te gusta la informática?",
"¿Te gustaría diagnosticar enfermedades?",
"¿Eres preciso manualmente?",
"¿Te comunicas bien con personas?",
"¿Te interesa el movimiento humano?",
"¿Eres bueno argumentando?",
"¿Te gustan las finanzas?",
"¿Te gustaría trabajar en laboratorio?",
"¿Te gusta desarrollar software?"
];

const grupos = {
A:[0,8],
B:[1,9],
C:[2,10],
D:[3,11],
E:[4,12],
F:[5,13],
G:[6,14],
H:[7,15]
};

const carreras = {
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia y Kinesiología",
E:"Derecho",
F:"Contaduría Pública",
G:"Bioquímica y Farmacia",
H:"Ingeniería en Sistemas"
};

function iniciarTest(){
  const nombre = document.getElementById("nombre").value;
  if(!nombre){ alert("Completa tus datos"); return; }

  document.getElementById("formulario").style.display="none";
  document.getElementById("test").style.display="block";

  let html="";
  preguntas.forEach((p,i)=>{
    html+=`<div class="pregunta">
    <label><input type="checkbox" id="p${i}"> ${p}</label>
    </div>`;
  });
  document.getElementById("preguntas").innerHTML=html;
}

async function procesar(){
  const anyChecked = preguntas.some((_,i)=>document.getElementById("p"+i).checked);
  if(!anyChecked){ alert("Marca al menos una"); return; }

  document.getElementById("test").style.display="none";
  document.getElementById("cargando").style.display="block";

  const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

  for(const g in grupos){
    grupos[g].forEach(i=>{
      if(document.getElementById("p"+i).checked) conteo[g]++;
    });
  }

  const sorted = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
  const mejor = sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado claro";

  await new Promise(r=>setTimeout(r,1000));

  document.getElementById("cargando").style.display="none";
  document.getElementById("resultado").style.display="block";

  document.getElementById("carrera").innerHTML=`
  🎯 Tu mejor opción es:
  <br><br>
  <strong style="font-size:1.6rem;color:#0d3b66;">
  ${mejor}
  </strong>`;

  document.getElementById("detalle").innerHTML=`
  ✨ Este resultado refleja tus intereses principales.
  <br><br>
  🎓 Te recomendamos investigar más sobre esta carrera
  y hablar con profesionales antes de decidir.
  `;
}

function volver(){
  document.getElementById("resultado").style.display="none";
  document.getElementById("formulario").style.display="block";
}
</script>

</body>
</html>
