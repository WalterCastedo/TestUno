<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Vocacional — UNO</title>

<style>
body {
  font-family: "Segoe UI", Tahoma;
  margin: 0;
  background: linear-gradient(to right, #f0f4f8, #d9e2ec);
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 12px auto;
  width: 90%;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

h1, h2 { text-align:center; color:#0d3b66; }

.pregunta {
  margin:10px 0;
  padding:14px;
  background:#e9f1f7;
  border-radius:12px;
}

button {
  width:100%;
  padding:15px;
  background:#0d3b66;
  color:white;
  border:none;
  border-radius:12px;
}

#cargando {
  position:fixed;
  top:0; left:0;
  width:100%; height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loader {
  border:6px solid #eee;
  border-top:6px solid #0d3b66;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
<h1>Test Vocacional</h1>
</div>

<div id="formulario" class="card">
<input id="nombre" placeholder="Nombre">
<input id="edad" placeholder="Edad">
<input id="colegio" placeholder="Colegio">
<input id="celular" placeholder="Celular">
<input id="carrera_deseada" placeholder="Carrera deseada">
<button onclick="iniciarTest()">Iniciar</button>
</div>

<div id="test" class="card" style="display:none">
<div id="preguntas"></div>
<button onclick="procesar()">Finalizar</button>
</div>

<div id="cargando">
<div class="loader"></div>
<p>Procesando...</p>
</div>

<div id="resultado" class="card" style="display:none">
<h2 id="carrera"></h2>
<p id="detalle"></p>
</div>

<script>
const preguntas = [
"¿Te interesa el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te gusta cuidar pacientes?",
"¿Te gusta rehabilitación física?",
"¿Te interesa leyes?",
"¿Te gustan matemáticas?",
"¿Te gusta química?",
"¿Te gusta tecnología?",
"¿Te gusta diagnosticar?",
"¿Eres detallista?",
"¿Te gusta comunicar?",
"¿Te interesa movimiento humano?",
"¿Te gusta argumentar?",
"¿Te gusta finanzas?",
"¿Te gusta laboratorio?",
"¿Te gusta programar?"
];

const grupos = {
A:[0,8], B:[1,9], C:[2,10], D:[3,11],
E:[4,12], F:[5,13], G:[6,14], H:[7,15]
};

const carreras = {
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia",
E:"Derecho",
F:"Contaduría",
G:"Bioquímica",
H:"Sistemas"
};

function iniciarTest(){
document.getElementById("formulario").style.display="none";
document.getElementById("test").style.display="block";

let html="";
preguntas.forEach((p,i)=>{
html+=`<div class="pregunta">
<label><input type="checkbox" id="p${i}"> ${p}</label>
</div>`;
});
document.getElementById("preguntas").innerHTML=html;
}

async function procesar(){

document.getElementById("test").style.display="none";
document.getElementById("cargando").style.display="flex";

const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

for(const g in grupos){
grupos[g].forEach(i=>{
if(document.getElementById("p"+i).checked) conteo[g]++;
});
}

const sorted = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
const mejor = sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado";


// 🔥 ENVÍO A GOOGLE SHEETS
try{
await fetch("https://script.google.com/macros/s/AKfycbyWY3omjfHPg4sGB2xkTnd4DpHF98_Vjs_YGW86A9EOV2lZwY-PJ4TIJVecPTCIiYRc6A/exec",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nombre:document.getElementById("nombre").value,
edad:document.getElementById("edad").value,
colegio:document.getElementById("colegio").value,
celular:document.getElementById("celular").value,
carrera_deseada:document.getElementById("carrera_deseada").value,
recomendacion:mejor
})
});
}catch(e){ console.log(e); }

await new Promise(r=>setTimeout(r,1000));

document.getElementById("cargando").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("carrera").innerHTML=mejor;

document.getElementById("detalle").innerHTML=`
<a href="https://wa.me/59162241035">WhatsApp 1</a>
<a href="https://wa.me/59162241036">WhatsApp 2</a>
<br>
<a href="https://www.uno.edu.bo">Web</a>
`;
}
</script>

</body>
</html>
