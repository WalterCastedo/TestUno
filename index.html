<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Vocacional UNO</title>

<style>

/* 🔥 RESET CLAVE (ARREGLA DESBORDES) */
*{
  box-sizing:border-box;
}

body{
  font-family:"Segoe UI",sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0d3b66,#1e6091);
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:480px;
  padding:15px;
}

/* CARD */
.card{
  background:#fff;
  padding:25px 20px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.2);
  animation:fade .5s ease;
}

/* TITULOS */
h1{
  text-align:center;
  color:#0d3b66;
  margin-bottom:15px;
}

h2{
  text-align:center;
  margin-bottom:15px;
  color:#333;
}

/* INPUTS PERFECTOS */
.input-group{
  margin-bottom:12px;
}

.input-group input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  transition:.3s;
}

.input-group input:focus{
  outline:none;
  border-color:#0d3b66;
  box-shadow:0 0 0 2px rgba(13,59,102,0.1);
}

/* BOTÓN */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0d3b66;
  color:#fff;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#144e87;
}

/* 🔥 PREGUNTAS PRO */
.pregunta{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:12px;
  border:1px solid #eee;
  margin-bottom:8px;
  transition:.25s;
  cursor:pointer;
}

.pregunta:hover{
  background:#f8fafc;
}

.pregunta input{
  accent-color:#0d3b66;
  width:18px;
  height:18px;
  cursor:pointer;
}

.numero{
  font-size:13px;
  font-weight:bold;
  color:#0d3b66;
  min-width:22px;
}

.texto{
  font-size:14px;
  color:#333;
}

/* ACTIVA */
.pregunta.activa{
  border:1px solid #0d3b66;
  background:#eef5ff;
}

/* LOADER */
.loader{
  border:6px solid #eee;
  border-top:6px solid #0d3b66;
  border-radius:50%;
  width:50px;
  height:50px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* RESULTADO */
.resultado-box{
  text-align:center;
}

.resultado-box p{
  font-size:15px;
  color:#444;
}

.resultado-box h1{
  font-size:32px;
  margin-top:10px;
  animation:pulse 1.5s infinite;
}

.cta{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(135deg,#0d3b66,#1e6091);
  color:#fff;
}

.cta a{
  display:block;
  margin-top:8px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

/* ANIMACIONES */
@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.06);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div id="formulario" class="card">
<h1>Test Vocacional</h1>

<div class="input-group">
  <input id="nombre" type="text" placeholder="Nombre completo" required>
</div>

<div class="input-group">
  <input id="edad" type="number" placeholder="Edad" min="1" max="99" required>
</div>

<div class="input-group">
  <input id="colegio" type="text" placeholder="Colegio" required>
</div>

<div class="input-group">
  <input id="celular" type="tel" placeholder="Celular (Ej: 71234567)" pattern="[0-9]{8}" required>
</div>

<div class="input-group">
  <input id="carrera_deseada" type="text" placeholder="Carrera de interés" required>
</div>

<button onclick="iniciar()">Comenzar Test</button>
</div>

<!-- TEST -->
<div id="test" class="card" style="display:none">
<h2>Selecciona lo que va contigo</h2>
<div id="preguntas"></div>
<button onclick="procesar()">Ver Resultado</button>
</div>

<!-- CARGA -->
<div id="cargando" class="card" style="display:none; text-align:center;">
<div class="loader"></div>
<p>Analizando tu perfil...</p>
</div>

<!-- RESULTADO -->
<div id="resultado" class="card" style="display:none">
<div class="resultado-box">
<p id="mensaje"></p>
<h1 id="carrera"></h1>

<div class="cta">
🎓 Descubre más sobre esta carrera:

<a href="https://wa.me/59162241035">📲 Asesor</a>
<a href="https://www.uno.edu.bo">🌐 Sitio Web</a>
</div>
</div>
</div>

</div>

<script>

const preguntas=[
"¿Te interesa el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te gusta cuidar pacientes?",
"¿Te gusta rehabilitación física?",
"¿Te interesa leyes?",
"¿Te gustan matemáticas?",
"¿Te gusta química?",
"¿Te gusta tecnología?",
"¿Te gusta diagnosticar?",
"¿Eres detallista?",
"¿Te gusta comunicar?",
"¿Te interesa movimiento humano?",
"¿Te gusta argumentar?",
"¿Te gusta finanzas?",
"¿Te gusta laboratorio?",
"¿Te gusta programar?"
];

const grupos={
A:[0,8], B:[1,9], C:[2,10], D:[3,11],
E:[4,12], F:[5,13], G:[6,14], H:[7,15]
};

const carreras={
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia",
E:"Derecho",
F:"Contaduría",
G:"Bioquímica",
H:"Sistemas"
};

let respuestas=[];

function iniciar(){
document.getElementById("formulario").style.display="none";
document.getElementById("test").style.display="block";

let html="";
preguntas.forEach((p,i)=>{
html+=`
<div class="pregunta" onclick="toggle(${i})" id="p${i}">
  <input type="checkbox" id="c${i}">
  <div class="numero">${i+1}</div>
  <div class="texto">${p}</div>
</div>`;
});
document.getElementById("preguntas").innerHTML=html;
}

function toggle(i){
const el=document.getElementById("p"+i);
const check=document.getElementById("c"+i);

if(respuestas[i]){
  respuestas[i]=0;
  check.checked=false;
  el.classList.remove("activa");
}else{
  respuestas[i]=1;
  check.checked=true;
  el.classList.add("activa");
}
}

async function procesar(){

document.getElementById("test").style.display="none";
document.getElementById("cargando").style.display="block";

const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

for(const g in grupos){
grupos[g].forEach(i=>{
if(respuestas[i]==1) conteo[g]++;
});
}

const sorted=Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
const mejor=sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado";

await new Promise(r=>setTimeout(r,1200));

document.getElementById("cargando").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("mensaje").innerText =
"Hemos analizado tu perfil y encontramos que tienes un alto potencial en:";

document.getElementById("carrera").innerText = mejor;

}

</script>

</body>
</html>
