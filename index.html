<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Vocacional UNO</title>

<style>
body{
  font-family:"Segoe UI";
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0d3b66,#1e6091);
  color:#fff;
}

.container{
  width:100%;
  max-width:500px;
  padding:20px;
}

.card{
  background:#fff;
  color:#333;
  padding:25px;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  animation:fadeIn .6s ease;
}

h1,h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0d3b66;
  color:#fff;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#144e87;
  transform:scale(1.03);
}

/* PREGUNTAS */
.pregunta{
  display:flex;
  align-items:center;
  gap:10px;
  background:#f1f5f9;
  padding:12px;
  border-radius:12px;
  margin:6px 0;
  cursor:pointer;
  transition:.3s;
}

.pregunta input{
  width:auto;
}

.pregunta.activa{
  background:#0d3b66;
  color:#fff;
}

/* LOADER */
.loader{
  border:6px solid #eee;
  border-top:6px solid #0d3b66;
  border-radius:50%;
  width:50px;
  height:50px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* RESULTADO */
.resultado-box{
  text-align:center;
  animation:zoomIn .8s ease;
}

.resultado-box h1{
  font-size:32px;
  color:#0d3b66;
  animation:pulse 1.5s infinite;
}

.cta{
  background:linear-gradient(135deg,#0d3b66,#1e6091);
  color:#fff;
  padding:18px;
  border-radius:15px;
  margin-top:15px;
}

.cta a{
  display:block;
  margin:8px 0;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.cta a:hover{
  text-decoration:underline;
}

/* ANIMACIONES */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes zoomIn{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div id="formulario" class="card">
<h1>Test Vocacional</h1>

<input id="nombre" placeholder="Nombre">
<input id="edad" placeholder="Edad">
<input id="colegio" placeholder="Colegio">
<input id="celular" placeholder="Celular">
<input id="carrera_deseada" placeholder="Carrera deseada">

<button onclick="iniciar()">Iniciar Test</button>
</div>

<!-- TEST -->
<div id="test" class="card" style="display:none">
<h2>Selecciona las que te identifican:</h2>
<div id="preguntas"></div>

<button onclick="procesar()">Ver Resultado</button>
</div>

<!-- CARGANDO -->
<div id="cargando" class="card" style="display:none">
<div class="loader"></div>
<p style="text-align:center;">Analizando tu perfil...</p>
</div>

<!-- RESULTADO -->
<div id="resultado" class="card" style="display:none">
  <div class="resultado-box">
    <h2>🚀 Tu futuro empieza hoy</h2>
    <h1 id="carrera"></h1>

    <p>Hemos analizado tus respuestas y esta es tu mejor opción profesional.</p>

    <div class="cta">
      🎓 Da el siguiente paso:

      <a href="https://wa.me/59162241035">📲 Hablar con Asesor 1</a>
      <a href="https://wa.me/59162241036">📲 Hablar con Asesor 2</a>
      <a href="https://www.uno.edu.bo">🌐 Visitar Sitio Web</a>
    </div>
  </div>
</div>

</div>

<script>

const preguntas=[
"¿Te interesa el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te gusta cuidar pacientes?",
"¿Te gusta rehabilitación física?",
"¿Te interesa leyes?",
"¿Te gustan matemáticas?",
"¿Te gusta química?",
"¿Te gusta tecnología?",
"¿Te gusta diagnosticar?",
"¿Eres detallista?",
"¿Te gusta comunicar?",
"¿Te interesa movimiento humano?",
"¿Te gusta argumentar?",
"¿Te gusta finanzas?",
"¿Te gusta laboratorio?",
"¿Te gusta programar?"
];

const grupos={
A:[0,8], B:[1,9], C:[2,10], D:[3,11],
E:[4,12], F:[5,13], G:[6,14], H:[7,15]
};

const carreras={
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia",
E:"Derecho",
F:"Contaduría",
G:"Bioquímica",
H:"Sistemas"
};

let respuestas=[];

function iniciar(){
document.getElementById("formulario").style.display="none";
document.getElementById("test").style.display="block";

let html="";
preguntas.forEach((p,i)=>{
html+=`
<div class="pregunta" onclick="toggle(${i})" id="p${i}">
  <input type="checkbox" id="c${i}">
  <label>${p}</label>
</div>`;
});
document.getElementById("preguntas").innerHTML=html;
}

function toggle(i){
const el=document.getElementById("p"+i);
const check=document.getElementById("c"+i);

if(respuestas[i]){
  respuestas[i]=0;
  check.checked=false;
  el.classList.remove("activa");
}else{
  respuestas[i]=1;
  check.checked=true;
  el.classList.add("activa");
}
}

async function procesar(){

document.getElementById("test").style.display="none";
document.getElementById("cargando").style.display="block";

const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

for(const g in grupos){
grupos[g].forEach(i=>{
if(respuestas[i]==1) conteo[g]++;
});
}

const sorted=Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
const mejor=sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado";

try{
await fetch("https://script.google.com/macros/s/AKfycbyFOe2u3UyAPf5Bo_LQhxeiOx7EfTrnoaPc7cB1fwtAzGIzBhOsC6up_B_9NeJAzIMTAg/exec",{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nombre:document.getElementById("nombre").value,
edad:document.getElementById("edad").value,
colegio:document.getElementById("colegio").value,
celular:document.getElementById("celular").value,
carrera_deseada:document.getElementById("carrera_deseada").value,
recomendacion:mejor
})
});
}catch(e){console.log("Error:",e);}

await new Promise(r=>setTimeout(r,1200));

document.getElementById("cargando").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("carrera").innerText=mejor;
}

</script>

</body>
</html>
