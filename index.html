<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Vocacional UNO</title>

<style>
body{
  font-family:"Segoe UI";
  margin:0;
  background:linear-gradient(135deg,#0d3b66,#1e6091);
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  color:#333;
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}

h1{text-align:center;color:#0d3b66;}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#0d3b66;
  color:#fff;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

/* PREGUNTAS */
.pregunta{
  background:#f1f5f9;
  padding:15px;
  border-radius:12px;
  margin:8px 0;
  cursor:pointer;
  transition:.3s;
}

.pregunta.activa{
  background:#0d3b66;
  color:#fff;
  transform:scale(1.02);
}

.loader{
  border:6px solid #eee;
  border-top:6px solid #0d3b66;
  border-radius:50%;
  width:50px;
  height:50px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

.cta{
  background:#0d3b66;
  color:#fff;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="formulario" class="card">
<h1>Test Vocacional</h1>

<input id="nombre" placeholder="Nombre">
<input id="edad" placeholder="Edad">
<input id="colegio" placeholder="Colegio">
<input id="celular" placeholder="Celular">
<input id="carrera_deseada" placeholder="Carrera deseada">

<button onclick="iniciar()">Iniciar Test</button>
</div>

<div id="test" class="card" style="display:none">
<h2>Selecciona las que te identifican:</h2>
<div id="preguntas"></div>

<button onclick="procesar()">Ver Resultado</button>
</div>

<div id="cargando" class="card" style="display:none">
<div class="loader"></div>
<p>Analizando...</p>
</div>

<div id="resultado" class="card" style="display:none">
<h2>Tu mejor opción es:</h2>
<h1 id="carrera"></h1>

<div class="cta">
🎓 Da el siguiente paso en tu futuro:

<a href="https://wa.me/59162241035">📲 Asesor 1</a><br>
<a href="https://wa.me/59162241036">📲 Asesor 2</a><br>
<a href="https://www.uno.edu.bo">🌐 Web</a>
</div>

</div>

</div>

<script>

const preguntas=[
"¿Te interesa el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te gusta cuidar pacientes?",
"¿Te gusta rehabilitación física?",
"¿Te interesa leyes?",
"¿Te gustan matemáticas?",
"¿Te gusta química?",
"¿Te gusta tecnología?",
"¿Te gusta diagnosticar?",
"¿Eres detallista?",
"¿Te gusta comunicar?",
"¿Te interesa movimiento humano?",
"¿Te gusta argumentar?",
"¿Te gusta finanzas?",
"¿Te gusta laboratorio?",
"¿Te gusta programar?"
];

const grupos={
A:[0,8], B:[1,9], C:[2,10], D:[3,11],
E:[4,12], F:[5,13], G:[6,14], H:[7,15]
};

const carreras={
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia",
E:"Derecho",
F:"Contaduría",
G:"Bioquímica",
H:"Sistemas"
};

let respuestas=[];

function iniciar(){
document.getElementById("formulario").style.display="none";
document.getElementById("test").style.display="block";

let html="";
preguntas.forEach((p,i)=>{
html+=`<div class="pregunta" onclick="toggle(${i})" id="p${i}">
${p}
</div>`;
});
document.getElementById("preguntas").innerHTML=html;
}

function toggle(i){
const el=document.getElementById("p"+i);

if(respuestas[i]){
respuestas[i]=0;
el.classList.remove("activa");
}else{
respuestas[i]=1;
el.classList.add("activa");
}
}

async function procesar(){

document.getElementById("test").style.display="none";
document.getElementById("cargando").style.display="block";

const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

for(const g in grupos){
grupos[g].forEach(i=>{
if(respuestas[i]==1) conteo[g]++;
});
}

const sorted=Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
const mejor=sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado";


// 🔥 ENVÍO CORREGIDO
try{
await fetch("https://script.google.com/macros/s/AKfycbyFOe2u3UyAPf5Bo_LQhxeiOx7EfTrnoaPc7cB1fwtAzGIzBhOsC6up_B_9NeJAzIMTAg/exec",{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nombre:document.getElementById("nombre").value,
edad:document.getElementById("edad").value,
colegio:document.getElementById("colegio").value,
celular:document.getElementById("celular").value,
carrera_deseada:document.getElementById("carrera_deseada").value,
recomendacion:mejor
})
});
}catch(e){console.log("Error:",e);}

await new Promise(r=>setTimeout(r,1200));

document.getElementById("cargando").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("carrera").innerText=mejor;
}

</script>

</body>
</html>
