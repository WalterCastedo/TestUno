<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Test Vocacional — UNO</title>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(to right, #f0f4f8, #d9e2ec);
  color: #333;
}

h1, h2 {
  text-align: center;
  color: #0d3b66;
  margin-bottom: 12px;
  font-size: 1.6rem;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin: 12px auto;
  width: 90%;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.pregunta {
  margin: 10px 0;
  padding: 14px;
  background: #e9f1f7;
  border-radius: 12px;
  font-size: 1.1rem;
}

.pregunta:hover {
  background: #d0e4f7;
}

.pregunta input[type="checkbox"] {
  width: 22px;
  height: 22px;
  transform: scale(1.3);
  margin-right: 10px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 1.05rem;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  background: #0d3b66;
  color: white;
  border-radius: 16px;
  font-size: 1.1rem;
  cursor: pointer;
}

button:hover {
  background: #094172;
}

.logo {
  max-width: 150px;
}

/* LOADER PANTALLA COMPLETA */
#cargando {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(to right, #f0f4f8, #d9e2ec);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
  text-align: center;
}

/* Spinner animado */
.loader {
  border: 6px solid #e0e0e0;
  border-top: 6px solid #0d3b66;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

#resultado {
  text-align: center;
}

#detalle a {
  display: inline-block;
  margin: 6px 4px;
  padding: 10px 14px;
  background: #0d3b66;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-size: 0.95rem;
}

#detalle a:hover {
  background: #094172;
}
</style>
</head>

<body>

<div class="card">
  <div style="text-align:center;">
    <img src="logo.png" class="logo">
  </div>
  <h1>Test Vocacional por Carreras</h1>
  <h2 style="font-size:0.9rem;">Marca solo las preguntas que apliquen para ti.</h2>
</div>

<div id="formulario" class="card">
  <h2>Datos del Estudiante</h2>
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="number" id="edad" placeholder="Edad">
  <input type="text" id="colegio" placeholder="Colegio">
  <input type="tel" id="celular" placeholder="Celular">
  <input type="text" id="carrera_deseada" placeholder="Carrera deseada">
  <button onclick="iniciarTest()">Iniciar Test</button>
</div>

<div id="test" class="card" style="display:none">
  <h2>Responde el Test</h2>
  <div id="preguntas"></div>
  <button onclick="procesar()">Finalizar y Ver Resultado</button>
</div>

<!-- LOADER -->
<div id="cargando">
  <div class="loader"></div>
  <h2>Procesando tus resultados...</h2>
  <p>Un momento por favor</p>
</div>

<div id="resultado" class="card" style="display:none">
  <h2>Resultado del Test</h2>
  <h3 id="carrera"></h3>
  <p id="detalle"></p>
  <button onclick="volver()">Volver</button>
</div>

<script>
const preguntas = [
"¿Te interesa entender cómo funciona el cuerpo humano?",
"¿Te interesa la salud bucal?",
"¿Te ves cuidando de los pacientes en un entorno hospitalario?",
"¿Te gustaría trabajar en la rehabilitación física de personas?",
"¿Te interesa el sistema legal y cómo se aplican las leyes?",
"¿Eres bueno/a con los números y la resolución de problemas matemáticos?",
"¿Te interesan la química y la biología?",
"¿Te gusta la tecnología y el mundo de la informática?",
"¿Te gustaría poder diagnosticar y tratar enfermedades?",
"¿Eres preciso/a y cuidadoso/a en tu trabajo manual?",
"¿Eres bueno/a en la comunicación y en hacer sentir a las personas cómodas?",
"¿Estás interesado/a en cómo funciona el movimiento humano?",
"¿Eres bueno/a en la argumentación y negociación?",
"¿Te ves trabajando en un entorno de oficina, manejando finanzas y cuentas?",
"¿Te gustaría trabajar en un laboratorio, realizando análisis y pruebas?",
"¿Te ves diseñando y desarrollando software o sistemas de información?"
];

const grupos = {
A:[0,8], B:[1,9], C:[2,10], D:[3,11],
E:[4,12], F:[5,13], G:[6,14], H:[7,15]
};

const carreras = {
A:"Medicina",
B:"Odontología",
C:"Enfermería",
D:"Fisioterapia y Kinesiología",
E:"Derecho",
F:"Contaduría Pública",
G:"Bioquímica y Farmacia",
H:"Ingeniería en Sistemas"
};

function iniciarTest(){
  const nombre = document.getElementById("nombre").value.trim();
  const edad = document.getElementById("edad").value.trim();
  const colegio = document.getElementById("colegio").value.trim();
  const celular = document.getElementById("celular").value.trim();
  const carreraDeseada = document.getElementById("carrera_deseada").value.trim();

  if(!nombre || !edad || !colegio || !celular || !carreraDeseada){
    alert("Completa todos los campos.");
    return;
  }

  document.getElementById("formulario").style.display="none";
  document.getElementById("test").style.display="block";

  let html="";
  preguntas.forEach((p,i)=>{
    html+=`<div class="pregunta">
      <label><input type="checkbox" id="p${i}"> ${i+1}. ${p}</label>
    </div>`;
  });

  document.getElementById("preguntas").innerHTML=html;

  setTimeout(()=>{
    window.scrollTo({top:0,behavior:"smooth"});
  },50);
}

async function procesar(){
  const anyChecked = preguntas.some((_,i)=>document.getElementById("p"+i).checked);
  if(!anyChecked){
    alert("Debes marcar al menos una pregunta.");
    return;
  }

  document.getElementById("test").style.display="none";
  document.getElementById("cargando").style.display="flex";

  const conteo={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};

  for(const g in grupos){
    grupos[g].forEach(i=>{
      if(document.getElementById("p"+i).checked) conteo[g]++;
    });
  }

  const sorted = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
  const mejor = sorted[0][1]>0 ? carreras[sorted[0][0]] : "Sin resultado claro";

  await new Promise(r=>setTimeout(r,1200));

  document.getElementById("cargando").style.display="none";
  document.getElementById("resultado").style.display="block";

  document.getElementById("carrera").innerHTML=`
    🎯 Tu mejor opción es:
    <br><br>
    <strong style="font-size:1.6rem;color:#0d3b66;">
      ${mejor}
    </strong>
  `;

  document.getElementById("detalle").innerHTML=`
    ✨ Según tus respuestas, esta carrera se adapta mejor a tu perfil.
    <br><br>
    🎓 Te invitamos a conocer más con nosotros:
    <br><br>

    <a href="https://wa.me/59162241035" target="_blank">📱 WhatsApp 62241035</a>
    <a href="https://wa.me/59162241036" target="_blank">📱 WhatsApp 62241036</a>
    <br>
    <a href="https://www.uno.edu.bo" target="_blank">🌐 Visitar página web</a>
  `;
}

function volver(){
  document.getElementById("resultado").style.display="none";
  document.getElementById("formulario").style.display="block";
}
</script>

</body>
</html>
